name: Publish Snapshot to GitHub Packages

on:
  push:
    branches: [ main, "maintenance/*" ]
  workflow_dispatch:

jobs:

  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:

      - name: Cloning the Repository
        uses: actions/checkout@v4

      - name: Get current version
        id: version
        run: |
          mvn help:evaluate -Dexpression=project.version -q -DforceStdout --no-transfer-progress
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout --no-transfer-progress)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current project version: $VERSION"

      - name: Ensure Snapshot Version
        run: |
          CURRENT=${{ steps.version.outputs.version }}

          # Exit if NOT a snapshot
          if [[ "$CURRENT" != *-SNAPSHOT ]]; then
            echo "::error::Expected a -SNAPSHOT version, but found '$CURRENT'."
            echo "The main branch must end with -SNAPSHOT before running a release."
            echo "Please bump the version in pom.xml and push before retrying."
            exit 1
          fi

      - name: Set up JDK 21 and Maven Credentials
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Install (skip tests)
        run: mvn -B --no-transfer-progress clean install -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Test and Publish Snapshot
        run: mvn -B --no-transfer-progress deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Extract Javadocs from JARs
        run: |
          mkdir -p target/site/apidocs
          find . -name "*-javadoc.jar" -not -path "*/debug/*" -not -path "*/.m2/*" | while read jar; do
            module=$(basename $(dirname $(dirname "$jar")))
            mkdir -p "target/site/apidocs/$module"
            unzip -q -o "$jar" -d "target/site/apidocs/$module"
          done

      - name: Deploy Snapshot Javadocs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/apidocs
          destination_dir: snapshot
          keep_files: true
